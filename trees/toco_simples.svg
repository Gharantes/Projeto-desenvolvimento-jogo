  <ellipse cx="340" cy="122" rx="27" ry="7.5" fill="none" stroke="#c8a050" stroke-width="1.5" style="fill:none;stroke:rgb(200, 160, 80);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <ellipse cx="340" cy="122" rx="16" ry="4.5" fill="none" stroke="#c8a050" stroke-width="1.2" style="fill:none;stroke:rgb(200, 160, 80);color:rgb(0, 0, 0);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
